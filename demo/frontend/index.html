<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeFi 健康度监控 Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  .msg-user { background: #3b82f6; color: white; align-self: flex-end; border-radius: 16px 16px 4px 16px; }
  .msg-agent { background: #f1f5f9; color: #1e293b; align-self: flex-start; border-radius: 16px 16px 16px 4px; }
  .msg-system { background: #fef3c7; color: #92400e; align-self: center; border-radius: 12px; font-size: 0.875rem; }
  .quick-btn { transition: all 0.15s; }
  .quick-btn:hover { transform: translateY(-1px); }
  .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
  .fade-in { animation: fadeIn 0.3s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .loading-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
  @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
  #chat-messages::-webkit-scrollbar { width: 4px; }
  #chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
</style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

<!-- 顶栏 -->
<header class="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-10 shadow-sm">
  <div class="max-w-3xl mx-auto flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="text-xl">🏦</span>
      <h1 class="text-lg font-bold text-gray-800">DeFi 健康度监控</h1>
      <span id="ai-badge" class="text-xs px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-700 hidden">AI 已启用</span>
    </div>
    <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500" title="后端在线"></div>
  </div>
</header>

<!-- Tab 切换 -->
<nav class="bg-white border-b border-gray-100 px-4 sticky top-[57px] z-10">
  <div class="max-w-3xl mx-auto flex gap-0">
    <button onclick="switchTab('dashboard')" id="tab-dashboard" class="tab-active px-4 py-3 text-sm font-medium text-gray-500 bg-transparent border-b-2 border-transparent transition-colors">
      📊 仪表盘
    </button>
    <button onclick="switchTab('chat')" id="tab-chat" class="px-4 py-3 text-sm font-medium text-gray-500 bg-transparent border-b-2 border-transparent transition-colors">
      💬 对话
    </button>
  </div>
</nav>

<!-- 主内容区 -->
<main class="max-w-3xl mx-auto px-4 py-4">

  <!-- ======== 仪表盘 Tab ======== -->
  <section id="panel-dashboard" class="fade-in">
    <!-- Top 协议柱状图 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">📈 Top 10 协议 TVL</h2>
      <div id="chart-tvl" style="height: 360px;"></div>
    </div>

    <!-- 风险一览 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-4">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">⚠️ 借贷协议风险一览</h2>
      <div id="risk-container" class="space-y-2">
        <p class="text-gray-400 text-sm text-center py-4">加载中...</p>
      </div>
    </div>

    <!-- 系统状态 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-2">🔧 系统状态</h2>
      <div class="text-sm text-gray-600 space-y-1">
        <div class="flex justify-between"><span>后端状态</span><span id="sys-status" class="text-green-600">● 在线</span></div>
        <div class="flex justify-between"><span>AI 分析</span><span id="sys-ai">检查中...</span></div>
        <div class="flex justify-between"><span>数据源</span><span>DefiLlama API（免费）</span></div>
      </div>
    </div>
  </section>

  <!-- ======== 对话 Tab ======== -->
  <section id="panel-chat" class="hidden">
    <!-- 快捷提问 -->
    <div class="flex flex-wrap gap-2 mb-3" id="quick-btns">
      <button onclick="sendQuick('Aave 现在风险怎么样？')" class="quick-btn text-xs bg-white border border-gray-200 rounded-full px-3 py-1.5 text-gray-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600 transition-colors">
        🔍 Aave 风险分析
      </button>
      <button onclick="sendQuick('最近有没有高利用率的借贷池？')" class="quick-btn text-xs bg-white border border-gray-200 rounded-full px-3 py-1.5 text-gray-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600 transition-colors">
        ⚠️ 清算预警
      </button>
      <button onclick="sendQuick('对比一下 Aave 和 Compound')" class="quick-btn text-xs bg-white border border-gray-200 rounded-full px-3 py-1.5 text-gray-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600 transition-colors">
        ⚖️ Aave vs Compound
      </button>
      <button onclick="sendQuick('DeFi 市场 TVL 排名 Top 5')" class="quick-btn text-xs bg-white border border-gray-200 rounded-full px-3 py-1.5 text-gray-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-600 transition-colors">
        🏆 TVL 排名
      </button>
    </div>

    <!-- 消息列表 -->
    <div id="chat-messages" class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-3 flex flex-col gap-3 overflow-y-auto" style="height: 420px;">
      <div class="msg-agent px-3 py-2 max-w-[85%] text-sm">
        👋 你好！我是 DeFi 健康度监控 Agent。<br>
        可以问我协议 TVL、借贷利用率、清算风险等问题。<br>
        试试下方的快捷按钮 👇
      </div>
    </div>

    <!-- 输入区 -->
    <div class="flex gap-2">
      <input id="chat-input" type="text"
             class="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
             placeholder="输入你的问题，如 'Aave 怎么样？'"
             onkeydown="if(event.key==='Enter') sendMessage()"
             maxlength="500">
      <button onclick="sendMessage()"
              class="bg-blue-500 hover:bg-blue-600 text-white rounded-xl px-5 py-2.5 text-sm font-medium transition-colors">
        发送
      </button>
    </div>
  </section>

</main>

<script>
// ============================================================
// 全局状态
// ============================================================
let currentTab = 'dashboard';
let chatHistory = [];
let aiAvailable = false;

// ============================================================
// Tab 切换
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('panel-dashboard').classList.toggle('hidden', tab !== 'dashboard');
  document.getElementById('panel-chat').classList.toggle('hidden', tab !== 'chat');
  document.getElementById('tab-dashboard').classList.toggle('tab-active', tab === 'dashboard');
  document.getElementById('tab-chat').classList.toggle('tab-active', tab === 'chat');

  // 切换时刷新图表（修复隐藏时 ECharts resize 问题）
  if (tab === 'dashboard') {
    setTimeout(() => { if (tvlChart) tvlChart.resize(); }, 100);
  }
}

// ============================================================
// 对话功能
// ============================================================
function sendQuick(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  // 显示用户消息
  addMessage(text, 'user');
  input.value = '';
  input.disabled = true;

  // 显示加载中
  const loadingId = addMessage('<span class="loading-dots">分析中</span>', 'agent');

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: chatHistory })
    });
    const data = await resp.json();

    // 移除加载消息
    removeMessage(loadingId);

    // 显示 Agent 回复
    addMessage(data.reply, 'agent');

    // 更新对话历史
    chatHistory.push(
      { role: 'user', content: text },
      { role: 'assistant', content: data.reply }
    );
    // 只保留最近 10 轮
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

  } catch (e) {
    removeMessage(loadingId);
    addMessage('❌ 请求失败，请检查后端是否启动。', 'system');
  }

  input.disabled = false;
  input.focus();
}

function addMessage(text, role) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  const id = 'msg-' + Date.now();
  div.id = id;
  div.className = role === 'user' ? 'msg-user px-3 py-2 max-w-[85%] text-sm fade-in'
               : role === 'system' ? 'msg-system px-3 py-2 max-w-[90%] text-sm fade-in'
               : 'msg-agent px-3 py-2 max-w-[85%] text-sm fade-in';
  div.innerHTML = text.replace(/\n/g, '<br>');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return id;
}

function removeMessage(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ============================================================
// 仪表盘功能
// ============================================================
let tvlChart = null;

async function loadDashboard() {
  try {
    const resp = await fetch('/api/top?limit=20');
    const data = await resp.json();

    if (data.success) {
      renderTvlChart(data.protocols.slice(0, 10));
      loadRiskOverview(data.protocols);
    }
  } catch (e) {
    console.error('仪表盘加载失败:', e);
  }
}

function renderTvlChart(protocols) {
  const dom = document.getElementById('chart-tvl');
  if (!tvlChart) tvlChart = echarts.init(dom);

  const names = protocols.map(p => p.name).reverse();
  const values = protocols.map(p => (p.tvl_usd / 1e9).toFixed(2)).reverse();

  tvlChart.setOption({
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'shadow' },
      formatter: p => `${p[0].name}<br/>TVL: <b>$${p[0].value}B</b>`
    },
    grid: { left: 100, right: 50, top: 10, bottom: 20 },
    xAxis: {
      type: 'value',
      axisLabel: { formatter: '${value}B', fontSize: 11 },
      splitLine: { lineStyle: { color: '#f1f5f9' } }
    },
    yAxis: {
      type: 'category',
      data: names,
      axisLabel: { fontSize: 11, width: 90, overflow: 'truncate' },
      axisTick: { show: false },
    },
    series: [{
      type: 'bar',
      data: values,
      itemStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
          { offset: 0, color: '#3b82f6' },
          { offset: 1, color: '#93c5fd' }
        ]),
        borderRadius: [0, 4, 4, 0],
      },
      barWidth: 16,
    }]
  });
}

async function loadRiskOverview(protocols) {
  // 对前几个借贷类协议检查风险
  const lendingProtocols = protocols.filter(p =>
    ['Lending', 'CDP', 'Liquid Staking'].some(c => (p.category || '').includes(c))
  ).slice(0, 6);

  const container = document.getElementById('risk-container');
  let html = '';

  for (const proto of lendingProtocols) {
    try {
      const resp = await fetch(`/api/protocol/${encodeURIComponent(proto.name)}`);
      const data = await resp.json();
      const risk = data.risk_assessment;
      const utilPct = risk ? risk.utilization_pct : 'N/A';
      const level = risk ? risk.risk_level : '⚪ 无数据';

      const bgColor = level.includes('高') ? 'bg-red-50 border-red-200'
                    : level.includes('中') ? 'bg-yellow-50 border-yellow-200'
                    : 'bg-green-50 border-green-200';

      html += `
        <div class="${bgColor} border rounded-lg px-3 py-2 flex items-center justify-between text-sm">
          <span class="font-medium text-gray-700">${proto.name}</span>
          <span class="text-gray-500">利用率 ${utilPct}</span>
          <span>${level}</span>
        </div>`;
    } catch {
      // 跳过加载失败的协议
    }
  }

  container.innerHTML = html || '<p class="text-gray-400 text-sm text-center py-4">暂无借贷协议数据</p>';
}

// ============================================================
// 健康检查 & 初始化
// ============================================================
async function checkHealth() {
  try {
    const resp = await fetch('/api/health');
    const data = await resp.json();
    // 更新 AI 状态
    aiAvailable = data.ai_available;
    const badge = document.getElementById('ai-badge');
    if (data.ai_available) {
      badge.classList.remove('hidden','bg-yellow-100','text-yellow-700');
      badge.classList.add('bg-green-100','text-green-700');
      badge.textContent = '🤖 AI 已启用';
    }
    document.getElementById('sys-ai').textContent = data.ai_available ? '🤖 已启用 (DeepSeek V4)' : '🔧 Demo 模式';
    document.getElementById('status-dot').classList.remove('bg-red-500');
    document.getElementById('status-dot').classList.add('bg-green-500');
  } catch (e) {
    document.getElementById('sys-status').innerHTML = '<span class="text-red-600">● 离线</span>';
    document.getElementById('status-dot').classList.remove('bg-green-500');
    document.getElementById('status-dot').classList.add('bg-red-500');
  }
}

// 页面加载
window.addEventListener('DOMContentLoaded', () => {
  checkHealth();
  loadDashboard();
  // 每 60s 刷新健康状态
  setInterval(checkHealth, 60000);
});

// 窗口大小变化时重绘图表
window.addEventListener('resize', () => {
  if (tvlChart) tvlChart.resize();
});
</script>

</body>
</html>
